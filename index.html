<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#a85f2e">
<title>Zatsuma – track your money flow</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-32.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zatsuma">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=30">
</head>
<body>
<div class="app">

  <header>
    <svg class="logo" viewBox="0 0 64 58">
      <!-- traced from Fab's logo draft: squashed satsuma, flat bottom, V leaves, cartoon eyes -->
      <path d="M32 13 C46 13 59 20 59 36 C59 49 47 55 32 55 C17 55 5 49 5 36 C5 20 18 13 32 13 Z" fill="#f5822a"/>
      <path d="M31.2 14 L32.8 14 L32.6 8 L31.4 8 Z" fill="#c96a1e"/>
      <path d="M30.5 11 C29 3 23 -2 17 0 C17 7 22 12 30.5 11 Z" fill="#4e9440" transform="rotate(-14 30 10)"/>
      <path d="M33.5 11 C35 3 41 -2 47 0 C47 7 42 12 33.5 11 Z" fill="#5aa74a" transform="rotate(14 34 10)"/>
      <g class="eye">
        <circle cx="24.5" cy="33" r="5" fill="#fff"/>
        <circle cx="25.5" cy="33.5" r="2.7" fill="#221510"/>
        <circle cx="24.4" cy="32.2" r="0.9" fill="#fff"/>
      </g>
      <g class="eye">
        <circle cx="39.5" cy="33" r="5" fill="#fff"/>
        <circle cx="40.5" cy="33.5" r="2.7" fill="#221510"/>
        <circle cx="39.4" cy="32.2" r="0.9" fill="#fff"/>
      </g>
      <path d="M22 43 Q32 50 42 43" stroke="#3a2415" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">ZATSUMA</div>
    <button class="more-btn" id="more-btn" aria-label="links">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 14a4 4 0 0 1 0-6l2-2a4 4 0 1 1 6 6l-1 1"/><path d="M14 10a4 4 0 0 1 0 6l-2 2a4 4 0 1 1-6-6l1-1"/></svg>
    </button>
  </header>

  <main id="view"></main>

  <button class="fab" id="fab" aria-label="add entry">+</button>

  <nav class="tabs">
    <button class="tab on" data-view="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      HOME</button>
    <button class="tab" data-view="entries">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="4" cy="6" r="1.1" fill="currentColor"/><circle cx="4" cy="12" r="1.1" fill="currentColor"/><circle cx="4" cy="18" r="1.1" fill="currentColor"/></svg>
      ENTRIES</button>
    <span></span>
    <button class="tab" data-view="goals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>
      GOALS</button>
    <button class="tab" data-view="reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      REPORTS</button>
  </nav>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet"></div>
  <div class="gate" id="gate" hidden></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=30"></script>
</body>
</html>
