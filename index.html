<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zatsuma — track the money that finds you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* website-matched neutrals */
    --paper: #fffdf9;
    --wash: #f6f3ec;
    --rust: #a85f2e;
    --rust-dark: #8d5024;
    --hairline: #e7e2d8;
    --ink: #171717;
    --text: #515151;
    --muted: #8e8e8e;
    /* satsuma brand */
    --satsuma: #f5822a;
    --leaf: #5a9e3d;
    /* bright category colours (the book palette) */
    --cat-pink: #e62d64;
    --cat-cyan: #119fe0;
    --cat-yellow: #ffce4e;
    --cat-magenta: #ec008b;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--wash);
    color: var(--text);
    display: flex; justify-content: center;
    min-height: 100vh;
  }
  .app {
    width: 100%; max-width: 430px; min-height: 100vh;
    background: var(--paper);
    display: flex; flex-direction: column;
    position: relative;
  }
  @media (min-width: 500px) {
    body { padding: 32px 0; }
    .app { min-height: 0; border-radius: 36px; overflow: hidden; box-shadow: 0 24px 60px rgba(23,23,23,0.25); }
  }

  /* ---------- header ---------- */
  header {
    background: var(--rust);
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px 14px;
  }
  .logo { width: 42px; height: 34px; flex-shrink: 0; }
  .wordmark {
    font-weight: 500; color: #fff; font-size: 23px; letter-spacing: 0.22em;
  }

  /* ---------- month nav + goal chip ---------- */
  .monthnav {
    display: flex; align-items: center; justify-content: center; gap: 24px;
    padding: 22px 0 2px;
  }
  .monthnav button {
    background: none; border: none; color: var(--rust);
    font-size: 22px; cursor: pointer; padding: 4px 10px; line-height: 1;
  }
  .monthnav .label {
    font-weight: 500; font-size: 20px; letter-spacing: 0.18em; color: var(--ink);
  }
  .goalchip {
    display: flex; justify-content: center; padding: 6px 0 0;
  }
  .goalchip .chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.14em; color: var(--muted);
    border: 1px solid var(--hairline); border-radius: 999px; padding: 5px 14px;
    background: var(--paper); cursor: pointer;
  }
  .goalchip .chip b { color: var(--rust); font-weight: 600; letter-spacing: 0.06em; }
  .goalchip .chip svg { width: 12px; height: 12px; opacity: 0.5; }

  /* ---------- donut ---------- */
  .donut-wrap { display: flex; justify-content: center; padding: 14px 0 2px; position: relative; }
  .donut { width: 232px; height: 232px; }
  .donut-centre {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .donut-centre .amt { font-weight: 500; font-size: 42px; line-height: 1.1; color: var(--ink); }
  .donut-centre .amt span { font-size: 22px; font-weight: 400; color: var(--muted); margin-right: 2px; }
  .donut-centre .sub { font-size: 11px; font-weight: 500; letter-spacing: 0.22em; color: var(--muted); margin-top: 2px; }

  .legend {
    display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
    padding: 14px 20px 4px; font-size: 13.5px; font-weight: 400; color: var(--text);
  }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  /* ---------- stat cards ---------- */
  .stats { padding: 18px 18px 0; display: flex; flex-direction: column; gap: 9px; }
  .stat {
    background: #fff; border: 1px solid var(--hairline); border-radius: var(--radius);
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
  }
  .stat .k { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; color: var(--muted); }
  .stat .v { font-weight: 500; font-size: 22px; color: var(--ink); }
  .stat.money .v { color: var(--cat-pink); }
  .stat.value .v { color: var(--cat-cyan); }
  .stat.left .v { color: var(--leaf); }

  /* ---------- encouragement ---------- */
  .cheer {
    margin: 14px 18px 0; background: #fdeef3; color: var(--cat-pink);
    border-radius: var(--radius); padding: 13px 16px; text-align: center;
    font-weight: 500; font-size: 15px; letter-spacing: 0.02em;
  }

  .watermark {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 26px 0 100px; opacity: 0.4;
  }
  .watermark svg { width: 26px; height: 21px; }
  .watermark span { font-weight: 500; letter-spacing: 0.3em; font-size: 12px; color: var(--rust); }

  /* ---------- bottom tabs ---------- */
  nav.tabs {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--rust);
    display: grid; grid-template-columns: 1fr 1fr 84px 1fr 1fr;
    padding: 10px 6px calc(12px + env(safe-area-inset-bottom));
  }
  nav.tabs a {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(255,255,255,0.72); text-decoration: none;
    font-size: 10px; font-weight: 500; letter-spacing: 0.16em;
  }
  nav.tabs a.on { color: #ffd9a0; }
  nav.tabs a svg { width: 21px; height: 21px; }
  .fab {
    position: absolute; bottom: calc(28px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--cat-pink); color: #fff; border: 4px solid var(--paper);
    font-size: 28px; font-weight: 300; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(230,45,100,0.4); cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <svg class="logo" viewBox="0 0 76 62">
      <!-- satsuma: wider than tall, gently flattened — like the original draft -->
      <ellipse cx="38" cy="36" rx="32" ry="24" fill="#f5822a"/>
      <path d="M38 13 C35 6 28 3 22 4 C24 10 30 14 38 13 Z" fill="#5a9e3d"/>
      <path d="M39 12 C43 5 51 4 56 8 C52 13 45 15 39 12 Z" fill="#6fb84e"/>
      <circle cx="28" cy="34" r="2.8" fill="#3a2415"/>
      <circle cx="48" cy="34" r="2.8" fill="#3a2415"/>
      <path d="M28 43 Q38 50 48 43" stroke="#3a2415" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">ZATSUMA</div>
  </header>

  <div class="monthnav">
    <button aria-label="previous month">‹</button>
    <div class="label">APRIL 2026</div>
    <button aria-label="next month">›</button>
  </div>

  <div class="goalchip">
    <span class="chip">GOAL <b>£10,000</b>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4L8 20l-5 1 1-5L17 3z"/></svg>
    </span>
  </div>

  <div class="donut-wrap">
    <svg class="donut" viewBox="0 0 100 100">
      <circle r="38" cx="50" cy="50" fill="none" stroke="#f1ece1" stroke-width="13"/>
      <circle r="38" cx="50" cy="50" fill="none" stroke="#e62d64" stroke-width="13"
        stroke-dasharray="95.5 143.3" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
      <circle r="38" cx="50" cy="50" fill="none" stroke="#119fe0" stroke-width="13"
        stroke-dasharray="83.6 155.2" stroke-dashoffset="-95.5" transform="rotate(-90 50 50)"/>
      <circle r="38" cx="50" cy="50" fill="none" stroke="#ffce4e" stroke-width="13"
        stroke-dasharray="59.7 179.1" stroke-dashoffset="-179.1" transform="rotate(-90 50 50)"/>
    </svg>
    <div class="donut-centre">
      <div class="amt"><span>£</span>8,450</div>
      <div class="sub">THIS MONTH</div>
    </div>
  </div>

  <div class="legend">
    <span><i style="background:var(--cat-pink)"></i>Studio</span>
    <span><i style="background:var(--cat-cyan)"></i>Coaching</span>
    <span><i style="background:var(--cat-yellow)"></i>Speaking</span>
  </div>

  <div class="stats">
    <div class="stat money"><div class="k">MONEY</div><div class="v">£8,450</div></div>
    <div class="stat value"><div class="k">VALUE</div><div class="v">£320</div></div>
    <div class="stat left"><div class="k">LEFT TO GO</div><div class="v">£1,550</div></div>
  </div>

  <div class="cheer">Only £1,550 to go — you can do this! 💥</div>

  <div class="watermark">
    <svg viewBox="0 0 76 62"><ellipse cx="38" cy="36" rx="32" ry="24" fill="#a85f2e"/></svg>
    <span>ZATSUMA</span>
  </div>

  <button class="fab" aria-label="add entry">+</button>
  <nav class="tabs">
    <a class="on" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      HOME</a>
    <a href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="4" cy="6" r="1.1" fill="currentColor"/><circle cx="4" cy="12" r="1.1" fill="currentColor"/><circle cx="4" cy="18" r="1.1" fill="currentColor"/></svg>
      ENTRIES</a>
    <span></span>
    <a href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>
      GOALS</a>
    <a href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      REPORTS</a>
  </nav>

</div>
</body>
</html>
